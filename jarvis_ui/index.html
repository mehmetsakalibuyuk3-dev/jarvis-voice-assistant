<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AGI HUD</title>
    <!-- Premium Google Fonts for high-end sci-fi interface -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Force browser to bypass cache for style.css by appending real-time timestamp
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'style.css?v=' + Date.now();
        document.head.appendChild(link);
    </script>
</head>
<body class="state-idle">
    <!-- Futuristic scanning/grid scanlines overlay -->
    <div class="hud-scanlines"></div>
    <div class="hud-noise"></div>

    <!-- Master Container - purely houses the central holographic core -->
    <div class="hud-minimal-container">
        
        <!-- ================= LEFT TRANSCRIPTION PANEL ================= -->
        <div class="hud-chat-panel">
            <div class="panel-header">CONVERSATION LOG</div>
            <div class="chat-logs" id="chat-logs">
                <div class="chat-entry system">
                    <span class="timestamp">[SYSTEM]</span>
                    <span class="message">JARVIS ONLINE & SECURE</span>
                </div>
            </div>
        </div>

        <!-- ================= CENTER PLATFORM ================= -->
        <main class="hud-center-platform">
            <!-- 3D WebGL Canvas Layer -->
            <div class="canvas-container">
                <canvas id="core-3d-canvas"></canvas>
            </div>
            
            <!-- Floating Holographic Crosshairs & Status Badge -->
            <div class="hologram-overlay">
                <div class="hud-angle-bracket top-left"></div>
                <div class="hud-angle-bracket top-right"></div>
                <div class="hud-angle-bracket bottom-left"></div>
                <div class="hud-angle-bracket bottom-right"></div>
                
                <div class="core-status-badge">
                    <span class="status-title">JARVIS CORE STATUS</span>
                    <span class="status-code" id="main-status">SYSTEM IDLE</span>
                </div>
            </div>
        </main>

        <!-- ================= RIGHT HARDWARE MONITOR ================= -->
        <div class="hud-stats-panel">
            <span class="panel-corner tl"></span>
            <span class="panel-corner tr"></span>
            <span class="panel-corner bl"></span>
            <span class="panel-corner br"></span>

            <div class="panel-header">SYSTEM TELEMETRY</div>
            <div class="stats-container">
                <div class="stat-row">
                    <div class="stat-meta">
                        <span class="stat-label">CPU LOAD</span>
                        <span class="stat-value" id="cpu-val">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="cpu-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <div class="stat-meta">
                        <span class="stat-label">SYSTEM RAM</span>
                        <span class="stat-value" id="ram-val">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="ram-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <div class="stat-meta">
                        <span class="stat-label">GPU VRAM</span>
                        <span class="stat-value" id="vram-val">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="vram-bar" style="width: 0%;"></div>
                    </div>
                    <div class="stat-sub-meta">
                        <span class="stat-sub-label" id="vram-mb-val">0 MB</span>
                    </div>
                </div>
            </div>

            <!-- ── ACTIVE PLANS WIDGET ── -->
            <div class="widget-divider"></div>
            <div class="widget-section">
                <div class="widget-header">
                    <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    ACTIVE PLANS
                </div>
                <div class="widget-body" id="plans-list">
                    <div class="widget-empty">Aktif plan yok</div>
                </div>
            </div>

            <!-- ── AI MODEL INFO WIDGET ── -->
            <div class="widget-divider"></div>
            <div class="widget-section">
                <div class="widget-header">
                    <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                    AI ENGINE
                </div>
                <div class="widget-body">
                    <div class="model-info-row">
                        <span class="model-info-label">MODEL</span>
                        <span class="model-info-value cyan" id="model-name-val">qwen3:14b</span>
                    </div>
                    <div class="model-info-row">
                        <span class="model-info-label">EMBED</span>
                        <span class="model-info-value" id="embed-name-val">nomic-embed-text</span>
                    </div>
                    <div class="model-info-row">
                        <span class="model-info-label">VRAM LOCK</span>
                        <span class="model-info-value vram-locked" id="vram-lock-val">&#x25CF; ACTIVE</span>
                    </div>
                    <div class="model-info-row">
                        <span class="model-info-label">RESPONSE</span>
                        <span class="model-info-value" id="response-time-val">— ms</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= BOTTOM CONTROL BAR ================= -->
        <div class="hud-control-bar">
            <button class="btn-ctrl" id="btn-mic" title="Mute/Unmute Mic">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-mic-active">
                    <path d="M12 1v11M19 10v2a7 7 0 0 1-14 0v-2M12 23v-4"/>
                    <rect x="9" y="5" width="6" height="8" rx="3"/>
                </svg>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-mic-muted" style="display: none;">
                    <line x1="1" y1="1" x2="23" y2="23"/>
                    <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/>
                    <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                </svg>
            </button>
            <button class="btn-ctrl btn-power" id="btn-power" title="Shut Down Jarvis">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
                    <line x1="12" y1="2" x2="12" y2="12"/>
                </svg>
            </button>
        </div>

    <!-- Load Three.js from local file (CDN backup) -->
    <script src="three.min.js"></script>
    <script>
        // Force browser to bypass cache for script.js by appending real-time timestamp
        const script = document.createElement('script');
        script.src = 'script.js?v=' + Date.now();
        document.body.appendChild(script);
    </script>
</body>
</html>
